# RDK-B Build Configuration

# Build settings
build:
  target: "banana-pi"

  branch:
    manifest: "rdk8-1.0.0"

  machine:
    model: "bananapi4-rdk-broadband"
    extender: "bananapi4-rdk-broadband-ap-extender"  

  workspace-dir: "/home/rdk/workspace"

# Layer-specific configurations
build-targets:
  bpi-r4-broadband:
    build-command: "bitbake rdk-generic-broadband-image"
    manifest: "https://code.rdkcentral.com/r/rdkcmf/manifests/rdkb-bpi-extsrc.xml"
  bpi-r4-easymesh-controller:
    build-command: "bitbake rdk-generic-broadband-image"
    manifest: "https://code.rdkcentral.com/r/rdkcmf/manifests/rdkb-bpi-extsrc.xml"
  bpi-r4-easymesh-extender:
    build-command: "bitbake rdk-generic-broadband-image"
    manifest: "https://code.rdkcentral.com/r/rdkcmf/manifests/rdkb-bpi-ap-extsrc.xml"
  bpi-r4-broadband-wifiagent:
    build-command: "bitbake rdk-generic-broadband-image"
    manifest: "https://code.rdkcentral.com/r/rdkcmf/manifests/rdkb-bpi-extsrc.xml"

